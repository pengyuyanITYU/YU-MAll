server:
  port: 8080

spring:
  application:
    name: yu-mall-gateway-service
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: item
              uri: lb://yu-mall-product-service
              predicates:
                - Path=/items/**,/shops/**
            - id: cart
              uri: lb://yu-mall-order-service
              predicates:
                - Path=/carts/**
            - id: user
              uri: lb://yu-mall-user-center-service
              predicates:
                - Path=/users/**,/upload/**
            - id: order
              uri: lb://yu-mall-order-service
              predicates:
                - Path=/orders/**
            - id: admin
              uri: lb://yu-mall-admin-service
              predicates:
                - Path=/admin/**,/admins/**
            - id: pay
              uri: lb://yu-mall-pay-service
              predicates:
                - Path=/pay-orders/**
            - id: search
              uri: lb://yu-mall-search-service
              predicates:
                - Path=/search/**
            - id: address
              uri: lb://yu-mall-user-center-service
              predicates:
                - Path=/addresses/**
            - id: member
              uri: lb://yu-mall-user-center-service
              predicates:
                - Path=/members/**
            - id: collect
              uri: lb://yu-mall-product-service
              predicates:
                - Path=/collects/**
            - id: comment
              uri: lb://yu-mall-product-service
              predicates:
                - Path=/comments/**
            - id: ai
              uri: lb://yu-mall-ai-service
              predicates:
                - Path=/ai/**
    nacos:
      server-addr: 192.168.100.128:8848
      username: nacos
      password: nacos
      config:
        namespace: yu-mall
        group: DEFAULT_GROUP
        import-check:
          enabled: false
      discovery:
        server-addr: 192.168.100.128:8848
        namespace: yu-mall
        group: DEFAULT_GROUP
        fail-fast: false
  config:
    import:
      - optional:nacos:shared-log.yaml?group=DEFAULT_GROUP&refreshEnabled=true
      - optional:nacos:gateway-routes.json?group=DEFAULT_GROUP&refreshEnabled=true
      - optional:nacos:gateway-service.yaml?group=DEFAULT_GROUP&refreshEnabled=true
