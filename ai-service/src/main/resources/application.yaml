server:
  port: 8092

spring:
  application:
    name: yu-mall-ai-service
  cloud:
    nacos:
      server-addr: 192.168.100.128:8848
      config:
        server-addr: 192.168.100.128:8848
        import-check:
          enabled: false
      discovery:
        server-addr: 192.168.100.128:8848
  ai:
    openai:
      base-url: ${YU_AI_BASE_URL:https://api.openai.com}
      api-key: ${YU_AI_API_KEY:sk-local-placeholder}
      chat:
        options:
          model: ${YU_AI_MODEL:gpt-4o-mini}
          temperature: ${YU_AI_TEMPERATURE:0.7}

yu:
  ai:
    default-model: ${YU_AI_MODEL:gpt-4o-mini}
    default-temperature: ${YU_AI_TEMPERATURE:0.7}
    system-prompt: ${YU_AI_SYSTEM_PROMPT:You are a helpful assistant.}

logging:
  level:
    com.yu: debug
  pattern:
    dateformat: HH:mm:ss:SSS
  file:
    path: logs/${spring.application.name}
