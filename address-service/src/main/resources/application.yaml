server:
  port: 8088

spring:
  application:
    name: yu-mall-address-service
  cloud:
    nacos:
      server-addr: 192.168.100.128:8848
      config:
        import-check:
          enabled: false
      discovery:
        server-addr: 192.168.100.128:8848
    sentinel:
      transport:
        dashboard: localhost:8090
      http-method-specify: true
  datasource:
    url: jdbc:mysql://${yu.db.host:192.168.100.128}:${yu.db.port:3307}/${yu.db.database}?useUnicode=true&characterEncoding=UTF-8&autoReconnect=true&serverTimezone=Asia/Shanghai&useSSL=false&rewriteBatchedStatements=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${yu.db.un:root}
    password: ${yu.db.pw:123}

feign:
  okhttp:
    enabled: true
    connection-timeout: 2000
    read-timeout: 5000
  sentinel:
    enabled: true

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    default-enum-type-handler: com.baomidou.mybatisplus.core.handlers.MybatisEnumTypeHandler
  global-config:
    db-config:
      update-strategy: not_null
      id-type: auto

seata:
  registry:
    type: nacos
    nacos:
      server-addr: 192.168.100.128:8848
      namespace: ""
      group: DEFAULT_GROUP
      application: seata-server
      username: nacos
      password: nacos
  tx-service-group: mall
  service:
    vgroup-mapping:
      mall: "default"
  data-source-proxy-mode: AT

dromara:
  x-file-storage:
    default-platform: aliyun-oss-yu
    thumbnail-suffix: ".min.jpg"
    aliyun-oss:
      - platform: aliyun-oss-yu
        enable-storage: true
        access-key: ${OSS_ACCESS_KEY}
        secret-key: ${OSS_SECRET_KEY}
        end-point: oss-cn-shenzhen.aliyuncs.com
        bucket-name: yu-mall-oss
        domain: https://yu-mall-oss.oss-cn-shenzhen.aliyuncs.com/
        base-path: YU-Mall/

logging:
  level:
    com.yu: debug
  pattern:
    dateformat: HH:mm:ss:SSS
  file:
    path: logs/${spring.application.name}

yu:
  db:
    host: 192.168.100.128
    port: 3307
    database: mall-user
    un: root
    pw: 123
